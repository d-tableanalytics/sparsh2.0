<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<style>
  :root{--bg:#f0f2f5;--card:#fff;--ink:#202124;--muted:#5f6368;--line:#e0e0e0;
    --accent:#673ab7;--accent-soft:#ede7f6;--req:#d93025;--ok:#15803d;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Google Sans',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);}
  .wrap{max-width:820px;margin:0 auto;padding:24px 14px 88px;}
  .topbar{height:10px;background:var(--accent);border-radius:12px 12px 0 0;}
  .head{background:var(--card);border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;padding:22px 24px;margin-bottom:18px;}
  .head h1{margin:0 0 6px;font-size:23px;}
  .head .meta{color:var(--muted);font-size:14px;}
  .head .meta b{color:var(--ink);}
  .banner{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;display:none;}
  .banner.show{display:block;}
  .banner.locked{background:#fff4e5;color:#8a5300;border:1px solid #ffd699;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:16px;}
  .q-title{font-size:17px;font-weight:600;margin:0 0 2px;}
  .q-title .star{color:var(--req);margin-left:4px;}
  .q-desc{color:var(--muted);font-size:14px;margin:0 0 16px;}
  .scroll{overflow-x:auto;}
  .grid{width:100%;border-collapse:collapse;}
  .grid th,.grid td{padding:12px 8px;text-align:center;}
  .grid thead th{font-weight:600;color:var(--muted);font-size:14px;border-bottom:1px solid var(--line);}
  .grid .name{text-align:left;color:var(--ink);font-size:14px;min-width:170px;}
  .grid .name small{display:block;color:var(--muted);font-size:12px;}
  .grid tbody tr:nth-child(even){background:#fafafa;}
  input[type=radio]{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;}
  input[type=radio]:disabled{cursor:default;}
  .bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:flex-end;gap:12px;align-items:center;}
  .bar .info{margin-right:auto;color:var(--muted);font-size:13px;}
  button{font-family:inherit;font-size:15px;font-weight:600;border:none;border-radius:8px;padding:10px 26px;cursor:pointer;}
  .submit{background:var(--accent);color:#fff;}
  .submit:disabled{opacity:.5;cursor:not-allowed;}
  .state{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:40px;text-align:center;color:var(--muted);}
  .err{color:var(--req);}
  .row-missing{outline:2px solid var(--req);outline-offset:-2px;}
  .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;opacity:0;transition:.3s;z-index:9;pointer-events:none;}
  .toast.show{opacity:1;}
  .done{text-align:center;padding:60px 20px;}
  .done .check{width:64px;height:64px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 16px;}
</style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <div class="wrap">
    <div class="topbar"></div>
    <div class="head">
      <h1>Culture Checklist</h1>
      <div class="meta" id="meta">Loading…</div>
      <div class="banner locked" id="lockBanner"></div>
    </div>
    <div id="content"><div class="state">Loading form…</div></div>
  </div>
  <div class="bar" id="bar" style="display:none">
    <span class="info" id="progress"></span>
    <button class="submit" id="submitBtn" onclick="submitForm()">Submit</button>
  </div>

<script>
  const CID='<?= CID ?>', EID='<?= EID ?>', MID='<?= MID ?>';
  let DATA=null, LOCKED=false;

  window.onload=function(){
    google.script.run.withSuccessHandler(render)
      .withFailureHandler(e=>showError(e.message)).getFormData(CID,EID,MID);
  };

  function showError(msg){
    document.getElementById('meta').textContent='';
    document.getElementById('content').innerHTML='<div class="state err">⚠ '+esc(msg)+'</div>';
  }

  function render(res){
    if(!res||!res.ok){showError(res?res.error:'Unknown error');return;}
    DATA=res;
    LOCKED = !!res.submitted;
    document.getElementById('meta').innerHTML=
      'Company: <b>'+esc(res.company)+'</b> &nbsp;•&nbsp; Month: <b>'+esc(res.month)+'</b> &nbsp;•&nbsp; HOD: <b>'+esc(res.hod.name)+'</b> ('+esc(res.hod.id)+')';

    if(res.submitted){
      const b=document.getElementById('lockBanner');
      b.classList.add('show');
      b.innerHTML='✏️ Partly submitted for <b>'+esc(res.month)+'</b>'+(res.submittedOn?(' on '+esc(res.submittedOn)):'')+'. Saved ratings are locked; you can still fill the blank ones and submit.';
    }

    if(!res.team.length){document.getElementById('content').innerHTML='<div class="state">No team members are mapped to this HOD.</div>';return;}
    if(!res.questions.length){document.getElementById('content').innerHTML='<div class="state">No questions found.</div>';return;}

    let html='';
    res.questions.forEach((q,qi)=>{
      html+='<div class="card" id="card_'+qi+'">';
      html+='<div class="q-title">'+(qi+1)+'. '+esc(q.title)+'<span class="star">*</span></div>';
      if(q.desc) html+='<div class="q-desc">'+esc(q.desc)+'</div>';
      html+='<div class="scroll"><table class="grid"><thead><tr><th class="name"></th>';
      for(let s=0;s<=5;s++) html+='<th>'+s+'</th>';
      html+='</tr></thead><tbody>';
      res.team.forEach((m,mi)=>{
        const sub=[m.designation,m.level].filter(Boolean).join(' - ');
       let saved = null;
        if (res.ratings && res.ratings[q.id] && res.ratings[q.id][m.id] != null) saved = res.ratings[q.id][m.id];
        else if (res.ratingsByText && res.ratingsByText[q.title] && res.ratingsByText[q.title][m.id] != null) saved = res.ratingsByText[q.title][m.id];
        const cellLocked = (saved != null);   // lock ONLY this cell if it already has a saved value
        html+='<tr id="r_'+qi+'_'+mi+'" data-locked="'+(cellLocked?1:0)+'"><td class="name">'+esc(m.name)+(sub?'<small>'+esc(sub)+'</small>':'')+'</td>';
        for(let s=0;s<=5;s++){
          const checked = (saved!=null && Number(saved)===s) ? ' checked' : '';
          const dis = cellLocked ? ' disabled' : '';
          html+='<td><input type="radio" name="q'+qi+'_e'+mi+'" value="'+s+'"'+checked+dis+' onchange="afterPick('+qi+','+mi+')"></td>';
        }
        html+='</tr>';
      });
      html+='</tbody></table></div></div>';
    });
    document.getElementById('content').innerHTML=html;

       document.getElementById('bar').style.display='flex';
    updateProgress();
  }

  function afterPick(qi,mi){document.getElementById('r_'+qi+'_'+mi).classList.remove('row-missing');updateProgress();}

  function totalCells(){return DATA.questions.length*DATA.team.length;}
  function filledCells(){
    let n=0;
    DATA.questions.forEach((q,qi)=>DATA.team.forEach((m,mi)=>{
      if(document.querySelector('input[name="q'+qi+'_e'+mi+'"]:checked')) n++;}));
    return n;
  }
  function updateProgress(){document.getElementById('progress').textContent=filledCells()+' / '+totalCells()+' rated';}

  function submitForm(){
    const ratings=[];
    DATA.questions.forEach((q,qi)=>DATA.team.forEach((m,mi)=>{
      const tr=document.getElementById('r_'+qi+'_'+mi);
      if(tr.getAttribute('data-locked')==='1') return;   // already saved → skip
      tr.classList.remove('row-missing');
      const sel=document.querySelector('input[name="q'+qi+'_e'+mi+'"]:checked');
      if(!sel) return;                                    // blank → just leave it for next time
      ratings.push({questionId:q.id,question:q.title,employeeId:m.id,employeeName:m.name,rating:Number(sel.value)});
    }));
    if(!ratings.length){toast('Pick at least one rating before submitting.');return;}
    const btn=document.getElementById('submitBtn');
    btn.disabled=true;btn.textContent='Submitting…';
    google.script.run
      .withSuccessHandler(r=>{
        if(r&&r.ok) done(r);
        else{btn.disabled=false;btn.textContent='Submit';toast((r&&r.error)||'Submit failed.');}})
      .withFailureHandler(e=>{btn.disabled=false;btn.textContent='Submit';toast(e.message);})
      .submitResponses({company:DATA.company,month:DATA.month,hodId:DATA.hod.id,hodName:DATA.hod.name,ratings:ratings});
  }

  function done(r){
    document.getElementById('bar').style.display='none';
    let extra='';
    if(r.mail){
      const e=r.mail.employees||{}, h=r.mail.hod||{};
      extra='<p style="color:var(--muted);font-size:13px">'
        +(h.mailed?('Summary sent to '+h.mailed+' reviewer(s). '):'')
        +(e.mailed?('Scorecards emailed to '+e.mailed+' employee(s).'):'')
        +(e.skipped?(' '+e.skipped+' had no email on file.'):'')
        +'</p>';
    }
    document.getElementById('content').innerHTML=
      '<div class="card done"><div class="check">✓</div><h2>Response recorded</h2>'+
      '<p style="color:var(--muted)">'+r.count+' ratings saved for '+esc(DATA.month)+'.</p>'+extra+'</div>';
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
</script>
</body>
</html>
