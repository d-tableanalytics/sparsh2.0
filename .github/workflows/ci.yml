name: CI

on:
  pull_request:
    branches:
      - main

# Cancel superseded runs on the same PR
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds both the backend and frontend images and validates
      # docker-compose.yml. Mirrors what the CD job builds on the server,
      # so build breaks (e.g. a bad Dockerfile / missing system dep) are
      # caught in the PR instead of on deploy.
      - name: Build images
        run: docker compose build
