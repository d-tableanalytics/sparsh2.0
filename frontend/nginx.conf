
server {
    listen 80;
    server_name erp.theknowcart.com;

    # Always redirect to HTTPS
    return 301 https://$host$request_uri;
}

# ── HTTPS – Main application server ──────────────────────────────────────────
server {
    listen 443 ssl;
    server_name erp.theknowcart.com;

    # ── SSL Certificate (Let's Encrypt via Certbot) ───────────────────────────
    ssl_certificate     /etc/letsencrypt/live/erp.theknowcart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.theknowcart.com/privkey.pem;

    # ── Strong SSL Settings (Mozilla Intermediate) ────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;

    # ── HSTS – tells browsers to always use HTTPS ─────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Static file root ──────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # ── Backend API reverse proxy ─────────────────────────────────────────────
    # Proxies /api/* → backend container on the internal Docker network.
    # Eliminates the need for CORS headers and hides port 8000 from the internet.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 300s;
    }

    # ── Static assets – aggressive 1-year cache (Vite uses content hashes) ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── React SPA fallback – all other routes served by index.html ───────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Large File Upload Support (Up to 5GB) ────────────────────────────────
    client_max_body_size 5120M;
    client_body_timeout 3600s;
    send_timeout 3600s;
    keepalive_timeout 3600s;
}
