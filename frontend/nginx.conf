# ── HTTP – Main application server ────────────────────────────────────────────
# Serves the SPA and reverse-proxies /api to the backend container over the
# internal Docker network. TLS is intentionally not terminated here: this box
# runs behind a shared host nginx and Sparsh is published on a dedicated port.
#
# To enable in-container HTTPS later (once a real domain points at this host):
#   1. Add a `listen 443 ssl;` server block with ssl_certificate paths under
#      /etc/letsencrypt/live/<domain>/  and a `listen 80 ... return 301 https`.
#   2. Mount the certs and publish 443 in docker-compose.yml.
# (A bare IP cannot get a Let's Encrypt certificate — a domain is required.)
server {
    listen 80;
    server_name _;

    # ── Static file root ──────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # ── Backend API reverse proxy ─────────────────────────────────────────────
    # Proxies /api/* → backend container on the internal Docker network.
    # Eliminates the need for CORS headers and hides port 8000 from the internet.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 300s;
    }

    # ── Static assets – aggressive 1-year cache (Vite uses content hashes) ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── React SPA fallback – all other routes served by index.html ───────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Large File Upload Support (Up to 5GB) ────────────────────────────────
    client_max_body_size 5120M;
    client_body_timeout 3600s;
    send_timeout 3600s;
    keepalive_timeout 3600s;
}
